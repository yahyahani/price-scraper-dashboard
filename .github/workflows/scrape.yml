name: Scheduled Scrape

# Draait elke dag automatisch, en kan ook handmatig gestart worden via de GitHub UI
on:
  schedule:
    - cron: "0 6 * * *"   # elke dag om 06:00 UTC
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python main.py --pages 5

      - name: Commit updated database
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add -f data/scraper.db
          git diff --staged --quiet || git commit -m "chore: scheduled scrape update"
          git push
